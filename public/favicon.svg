<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1f2937;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#111827;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" fill="url(#bgGradient)" rx="16"/>

  <!-- Life weeks grid (5x5 grid representing weeks of life) -->
  <!-- Row 1 - Filled weeks (past/lived) -->
  <rect x="15" y="20" width="10" height="10" fill="#10b981" rx="1.5"/>
  <rect x="30" y="20" width="10" height="10" fill="#10b981" rx="1.5"/>
  <rect x="45" y="20" width="10" height="10" fill="#34d399" rx="1.5"/>
  <rect x="60" y="20" width="10" height="10" fill="#6ee7b7" rx="1.5"/>
  <rect x="75" y="20" width="10" height="10" fill="#a7f3d0" rx="1.5"/>

  <!-- Row 2 -->
  <rect x="15" y="35" width="10" height="10" fill="#3b82f6" rx="1.5"/>
  <rect x="30" y="35" width="10" height="10" fill="#60a5fa" rx="1.5"/>
  <rect x="45" y="35" width="10" height="10" fill="#93c5fd" rx="1.5"/>
  <rect x="60" y="35" width="10" height="10" fill="#dbeafe" rx="1.5"/>
  <rect x="75" y="35" width="10" height="10" fill="#e0e7ff" rx="1.5"/>

  <!-- Row 3 -->
  <rect x="15" y="50" width="10" height="10" fill="#8b5cf6" rx="1.5"/>
  <rect x="30" y="50" width="10" height="10" fill="#a78bfa" rx="1.5"/>
  <rect x="45" y="50" width="10" height="10" fill="#c4b5fd" rx="1.5"/>
  <rect x="60" y="50" width="10" height="10" fill="#ede9fe" rx="1.5"/>
  <rect x="75" y="50" width="10" height="10" fill="#fef3c7" rx="1.5"/>

  <!-- Row 4 -->
  <rect x="15" y="65" width="10" height="10" fill="#f59e0b" rx="1.5"/>
  <rect x="30" y="65" width="10" height="10" fill="#fbbf24" rx="1.5"/>
  <rect x="45" y="65" width="10" height="10" fill="#fcd34d" rx="1.5"/>
  <rect x="60" y="65" width="10" height="10" fill="#fde68a" rx="1.5"/>
  <rect x="75" y="65" width="10" height="10" fill="#fef3c7" rx="1.5"/>

  <!-- Row 5 - Current week highlighted -->
  <rect x="15" y="80" width="10" height="10" fill="#ef4444" rx="1.5"/>
  <rect x="30" y="80" width="10" height="10" fill="#f87171" rx="1.5"/>
  <rect x="45" y="80" width="10" height="10" fill="#fca5a5" stroke="#fff" stroke-width="1.5" rx="1.5"/>
  <rect x="60" y="80" width="10" height="10" fill="#374151" opacity="0.3" rx="1.5"/>
  <rect x="75" y="80" width="10" height="10" fill="#374151" opacity="0.3" rx="1.5"/>
</svg>
