<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viventiva - Google Auth Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 50px auto;
            padding: 20px;
            background: #f8fafc;
        }
        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 {
            color: #1e293b;
            margin-bottom: 10px;
        }
        .status {
            padding: 15px;
            border-radius: 8px;
            margin: 15px 0;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 14px;
        }
        .status.success { background: #d1fae5; color: #065f46; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status.info { background: #dbeafe; color: #1e40af; }
        button {
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin: 10px 5px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .log {
            background: #1e293b;
            color: #e2e8f0;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Monaco', 'Courier New', monospace;
            font-size: 13px;
            line-height: 1.6;
        }
        .log-entry {
            margin: 5px 0;
            padding: 5px;
            border-left: 3px solid #3b82f6;
            padding-left: 10px;
        }
        .log-error { border-left-color: #ef4444; color: #fca5a5; }
        .log-success { border-left-color: #10b981; color: #86efac; }
        .log-info { border-left-color: #3b82f6; color: #93c5fd; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🔐 Viventiva - Google Auth Test</h1>
        <p style="color: #64748b; margin-bottom: 30px;">
            This page tests your Google OAuth configuration with Supabase
        </p>

        <div id="config-status" class="status info">
            Checking configuration...
        </div>

        <div style="margin: 20px 0;">
            <button id="test-google" onclick="testGoogleLogin()">
                🚀 Test Google Login
            </button>
            <button id="test-session" onclick="testSession()">
                👤 Check Current Session
            </button>
            <button id="test-signout" onclick="testSignOut()">
                🚪 Sign Out
            </button>
            <button onclick="clearLogs()">
                🗑️ Clear Logs
            </button>
        </div>

        <div class="log" id="console-log"></div>
    </div>

    <script>
        // Configuration
        const SUPABASE_URL = 'https://jnzwuknbqpihuhbdbhhv.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Impuend1a25icXBpaHVoYmRiaGh2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTk2OTA2MTYsImV4cCI6MjA3NTI2NjYxNn0.PuUVXaP5GrSYaIFCmxoV5R1-245ofdpx6NTREzrf5u0';

        // Initialize Supabase client
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                auth: {
                    autoRefreshToken: true,
                    persistSession: true,
                    detectSessionInUrl: true
                }
            });
            log('✅ Supabase client initialized successfully', 'success');
            updateConfigStatus('success', '✅ Configuration Valid - Ready to test');
        } catch (error) {
            log(`❌ Failed to initialize Supabase: ${error.message}`, 'error');
            updateConfigStatus('error', `❌ Configuration Error: ${error.message}`);
        }

        // Logging
        function log(message, type = 'info') {
            const logDiv = document.getElementById('console-log');
            const timestamp = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = `log-entry log-${type}`;
            entry.textContent = `[${timestamp}] ${message}`;
            logDiv.appendChild(entry);
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(`[Viventiva Test] ${message}`);
        }

        function clearLogs() {
            document.getElementById('console-log').innerHTML = '';
            log('Logs cleared', 'info');
        }

        function updateConfigStatus(type, message) {
            const statusDiv = document.getElementById('config-status');
            statusDiv.className = `status ${type}`;
            statusDiv.textContent = message;
        }

        // Test Google Login
        async function testGoogleLogin() {
            log('🚀 Initiating Google OAuth flow...', 'info');
            
            try {
                const { data, error } = await supabase.auth.signInWithOAuth({
                    provider: 'google',
                    options: {
                        redirectTo: window.location.href
                    }
                });

                if (error) {
                    log(`❌ OAuth Error: ${error.message}`, 'error');
                    updateConfigStatus('error', `❌ Error: ${error.message}`);
                    
                    // Provide helpful debugging info
                    if (error.message.includes('not enabled')) {
                        log('💡 Fix: Enable Google provider in Supabase Dashboard → Authentication → Providers', 'info');
                    }
                    if (error.message.includes('redirect')) {
                        log('💡 Fix: Add this URL to Google Cloud Console authorized redirects', 'info');
                    }
                } else {
                    log('✅ OAuth request successful, redirecting to Google...', 'success');
                    log('🔄 You will be redirected back after authentication', 'info');
                    // The page will redirect automatically
                }
            } catch (error) {
                log(`❌ Unexpected error: ${error.message}`, 'error');
                updateConfigStatus('error', `❌ Error: ${error.message}`);
            }
        }

        // Test Current Session
        async function testSession() {
            log('👤 Checking current session...', 'info');
            
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                
                if (error) {
                    log(`❌ Session Error: ${error.message}`, 'error');
                    return;
                }

                if (session) {
                    log('✅ Active session found!', 'success');
                    log(`   User ID: ${session.user.id}`, 'info');
                    log(`   Email: ${session.user.email || 'N/A'}`, 'info');
                    log(`   Provider: ${session.user.app_metadata.provider || 'N/A'}`, 'info');
                    log(`   Last Sign In: ${new Date(session.user.last_sign_in_at).toLocaleString()}`, 'info');
                    updateConfigStatus('success', '✅ User is authenticated');
                    
                    // Test database access
                    await testDatabaseAccess(session.user.id);
                } else {
                    log('ℹ️ No active session - user is not logged in', 'info');
                    updateConfigStatus('info', 'ℹ️ Not logged in - Click "Test Google Login"');
                }
            } catch (error) {
                log(`❌ Unexpected error: ${error.message}`, 'error');
            }
        }

        // Test Database Access
        async function testDatabaseAccess(userId) {
            log('🗄️ Testing database access...', 'info');
            
            try {
                const { data, error } = await supabase
                    .from('user_profiles')
                    .select('*')
                    .eq('user_id', userId)
                    .single();
                
                if (error) {
                    if (error.code === 'PGRST116') {
                        log('ℹ️ No user profile found (expected for first login)', 'info');
                    } else {
                        log(`⚠️ Database Error: ${error.message}`, 'error');
                    }
                } else if (data) {
                    log('✅ User profile loaded successfully!', 'success');
                    log(`   Name: ${data.name || 'Not set'}`, 'info');
                    log(`   Birth Year: ${data.birth_year || 'Not set'}`, 'info');
                    log(`   Life Expectancy: ${data.life_expectancy || 80}`, 'info');
                }
            } catch (error) {
                log(`❌ Database test failed: ${error.message}`, 'error');
            }
        }

        // Test Sign Out
        async function testSignOut() {
            log('🚪 Signing out...', 'info');
            
            try {
                const { error } = await supabase.auth.signOut();
                
                if (error) {
                    log(`❌ Sign out error: ${error.message}`, 'error');
                } else {
                    log('✅ Successfully signed out', 'success');
                    updateConfigStatus('info', 'ℹ️ Signed out - Click "Test Google Login" to try again');
                }
            } catch (error) {
                log(`❌ Unexpected error: ${error.message}`, 'error');
            }
        }

        // Check for OAuth callback on page load
        window.addEventListener('load', async () => {
            log('🔍 Checking for OAuth callback...', 'info');
            
            // Check if we have a hash (OAuth redirect)
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            if (hashParams.get('access_token')) {
                log('✅ OAuth callback detected! Processing authentication...', 'success');
                
                // Wait a moment for Supabase to process the session
                setTimeout(async () => {
                    await testSession();
                    
                    // Clean up URL
                    window.history.replaceState({}, document.title, window.location.pathname);
                }, 1000);
            } else {
                log('ℹ️ No OAuth callback - ready for testing', 'info');
                // Check if already logged in
                await testSession();
            }
        });

        // Test configuration on load
        log('🔧 Testing Supabase configuration...', 'info');
        log(`   URL: ${SUPABASE_URL}`, 'info');
        log(`   Anon Key: ${SUPABASE_ANON_KEY.substring(0, 20)}...`, 'info');
    </script>
</body>
</html>
